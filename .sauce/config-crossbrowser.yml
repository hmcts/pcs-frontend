# Cross-browser matrix for Sauce Playwright (eu-central-1).
#
# Working set for this region + saucectl schema (v0.202.x):
#   • Windows 10 / 11 — Chrome, Edge, Firefox, WebKit (WebKit on Windows: see Sauce limitations)
#   • macOS 13 — Chrome, Edge, Firefox, Safari (WebKit desktop)
#
# Not in this file (document as POC limitations unless Sauce enables them for your account/region):
#   • Android / iPhone / iPad — Playwright on Sauce in EU often reports "Android is not available" / no iOS
#     desktop matrix; use Appium / real-device cloud or another region if TCOE approves.
#   • macOS 14+ with Firefox — schema may reject until saucectl is upgraded; Firefox on macOS 15 has Sauce
#     known issues; macOS 13 is the safe combo for Firefox + WebKit with older saucectl.
#
# Run: yarn test:crossbrowser
# Test tag: SAUCE_GREP from env (Jenkinsfile_nightly sets @saucelab); override per run if needed.
# Ref: https://docs.saucelabs.com/web-apps/automated-testing/playwright/
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 3
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend-crossbrowser

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'pcs-frontend-win10-chrome'
    platformName: Windows 10
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-chrome'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win10-edge'
    platformName: Windows 10
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-edge'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win10-firefox'
    platformName: Windows 10
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-firefox'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  # WebKit on Windows: Sauce docs prefer macOS for WebKit; may see SSL/site issues on Windows.
  - name: 'pcs-frontend-win10-webkit'
    platformName: Windows 10
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-webkit'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: $SAUCE_GREP

  # saucectl 0.202 validation + EU allocators: use macOS 13 for Firefox/WebKit (not macOS 14 in schema for these combos).
  # WebKit on macOS: 1920x1080 is not allowed for this OS/browser — Sauce only offers e.g. 1024x768 … 1920x1440 (see job error).
  - name: 'pcs-frontend-mac13-firefox'
    platformName: macOS 13
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac13-webkit'
    platformName: macOS 13
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac13-chrome'
    platformName: macOS 13
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac13-edge'
    platformName: macOS 13
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

reporters:
  spotlight:
    enabled: true
