# Sauce Labs: Playwright @nightly ‚Äî Chrome (Win), Firefox (macOS), Safari (macOS), Edge (Win), Chrome (Android).
# Run: yarn test:crossbrowser  (tunnel + env from vault / CI).
# Jenkins: YarnBuilder / shared library after loadVaultSecrets + env (see Jenkinsfile_CNP patterns).
# Platform/browser matrix: https://docs.saucelabs.com/web-apps/automated-testing/playwright/ ‚Äî confirm Edge/Android if jobs fail to allocate.
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 5
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend
      - playwright
      - crossbrowser

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'PCS @nightly (Chrome ‚Äî Windows)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (Firefox ‚Äî macOS)'
    platformName: macOS 14
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (Safari ‚Äî macOS)'
    platformName: macOS 14
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (Edge ‚Äî Windows)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      # Sauce Playwright lists `chromium`; `MicrosoftEdge` project + channel in playwright.config.ts selects Edge.
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (Chrome ‚Äî Android)'
    platformName: Android
    screenResolution: 1080x1920
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: MobileChrome
      headless: true
      grep: '@nightly'

reporters:
  spotlight:
    enabled: true
