# Sauce Labs: Playwright @nightly tests on Chrome, Firefox, and WebKit (one suite per browser).
# Run: yarn test:crossbrowser  (with tunnel + env from vault / CI, same as test:saucelab).
# Jenkins: call via YarnBuilder / shared library after loadVaultSecrets + env (see Jenkinsfile_CNP patterns).
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 5
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend
      - playwright
      - crossbrowser

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

env:
  PLAYWRIGHT_SCREENSHOT_ON: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'PCS @nightly (Chrome)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (Firefox)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: '@nightly'

  - name: 'PCS @nightly (WebKit)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: '@nightly'

reporters:
  spotlight:
    enabled: true
