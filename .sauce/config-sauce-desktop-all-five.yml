# Five desktop suites (mac15 + win11). CLI only (not Jenkins matrix). yarn test:sauce:desktop-all-five
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 1
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend-desktop-all-five

defaults:
  timeout: 30m

playwright:
  version: 1.58.2
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.1.2'
    config: '^4.1.1'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'pcs-frontend-mac15-chrome'
    platformName: macOS 15
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac15-firefox'
    platformName: macOS 15
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-chrome'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-edge'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-firefox'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

reporters:
  spotlight:
    enabled: true
