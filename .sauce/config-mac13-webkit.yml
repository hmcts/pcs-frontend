# WebKit (Safari-class) on macOS — single suite.
# Sauce: ARM WebKit is supported for macOS 14+ with Playwright >= 1.58.1 (not macOS 13 + armRequired — that combo is rejected as unsupported).
# Run: yarn test:sauce:mac13-webkit (script name kept; SAUCE_GREP from env / Jenkinsfile_nightly)
# https://docs.saucelabs.com/web-apps/automated-testing/playwright/yaml/#armrequired
# 1440x900: validated for this stack (1080p invalid for some macOS WebKit images on Sauce).
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 1
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend-mac14-webkit

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'pcs-frontend-mac14-webkit'
    platformName: macOS 14
    armRequired: true
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: $SAUCE_GREP

reporters:
  spotlight:
    enabled: true
