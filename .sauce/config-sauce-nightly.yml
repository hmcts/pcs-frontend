# Nightly Sauce Playwright — OS/browser combos aligned with proven
# `nightly-dev-HDPI-5349-POC-Sauce-Playwright` `.sauce/config-matrix.yml` (eu-central-1).
# macOS 13 + 1440x900 for Chrome/Firefox; macOS 14 + ARM for Safari (WebKit); Windows 11 + 1920x1080 for Chrome/Edge/Firefox.
#
# Pick one suite:
#   yarn exec saucectl run -c .sauce/config-sauce-nightly.yml --select-suite "pcs-frontend-mac13-chrome"
# Multiple suites: Jenkins sets SAUCE_SUITE_NAMES → yarn test:crossbrowser (runs test:sauce:nightly per suite).
#
# Ref: https://docs.saucelabs.com/web-apps/automated-testing/playwright/
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 1
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend-nightly-matrix

defaults:
  timeout: 30m

# POC matrix used 1.58.1 successfully on subscription; keep in sync with Sauce docs for that line.
playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.1.2'
    config: '^4.1.1'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'pcs-frontend-mac13-chrome'
    platformName: macOS 13
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac13-firefox'
    platformName: macOS 13
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  # Safari = WebKit on Mac; HDPI-5349 POC: macOS 14 + armRequired (Premium tier may be required).
  - name: 'pcs-frontend-mac13-webkit'
    platformName: macOS 13
    armRequired: true
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: webkit
      project: webkit
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-chrome'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-edge'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-firefox'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

reporters:
  spotlight:
    enabled: true
