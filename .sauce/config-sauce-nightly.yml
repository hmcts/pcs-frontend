# Single Sauce Playwright config: all desktop suites. Pick one with:
#   yarn exec saucectl run -c .sauce/config-sauce-nightly.yml --select-suite "pcs-frontend-mac15-chrome"
# Run all five (no --select-suite): yarn test:sauce:all-desktops
# Allure: download raw results after each run (often under ./artifacts/<suite>/); src/test/ui/utils/scripts/sauce-crossbrowser-run.sh merges them.
apiVersion: v1alpha
kind: playwright

artifacts:
  cleanup: true
  download:
    when: always
    match:
      - 'allure-results/**'
    directory: ./artifacts

sauce:
  region: eu-central-1
  concurrency: 1
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend-nightly-matrix

defaults:
  timeout: 30m

playwright:
  version: 1.58.2
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.1.2'
    config: '^4.1.1'
    allure-js-commons: '3.5.0'
    allure-playwright: '3.5.0'

env:
  PLAYWRIGHT_SAUCE_FULL_JOURNEY_ARTIFACTS: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test

  TEST_URL: $TEST_URL
  MANAGE_CASE_URL: $MANAGE_CASE_URL

  PCS_API_URL: $PCS_API_URL
  DATA_STORE_URL_BASE: $DATA_STORE_URL_BASE
  PCS_API_CHANGE_ID: $PCS_API_CHANGE_ID

  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64

  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME

suites:
  - name: 'pcs-frontend-mac15-chrome'
    platformName: macOS 15
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-mac15-firefox'
    platformName: macOS 15
    screenResolution: 1440x900
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-chrome'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-edge'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: chromium
      project: MicrosoftEdge
      headless: true
      grep: $SAUCE_GREP

  - name: 'pcs-frontend-win11-firefox'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - ".*src/test/ui/.*\\.spec\\.ts$"
      - ".*src\\\\test\\\\ui\\\\.*\\.spec\\.ts$"
    params:
      browserName: firefox
      project: firefox
      headless: true
      grep: $SAUCE_GREP

reporters:
  spotlight:
    enabled: true
