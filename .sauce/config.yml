# All suites run in one go: yarn test:crossbrowser → saucectl run (see scripts/crossbrowser/runSauceCrossbrowser.ts).
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 1
  retries: 0
  metadata:
    tags:
      - pcs-frontend
      - crossbrowser

playwright:
  version: "1.58.1"
  configFile: playwright.sauce.config.ts
nodeVersion: "v20"
rootDir: ./

npm:
  registries:
    - url: https://registry.npmjs.org
  usePackageLock: false

# $VAR expanded by saucectl from the machine running `yarn test:crossbrowser` (Jenkins agent env / local shell). No saucectl `-e` needed.
env:
  CI: "true"
  TEST_URL: "$TEST_URL"
  NPM_CONFIG_PRODUCTION: "false"
  PCS_FRONTEND_IDAM_SECRET: "$PCS_FRONTEND_IDAM_SECRET"
  IDAM_PCS_USER_PASSWORD: "$IDAM_PCS_USER_PASSWORD"

# Quick feedback: only one suite active. Uncomment the blocks below for full Chrome/Firefox × Windows/macOS matrix.
suites:
  - name: PCS crossbrowser chrome windows
    platformName: "Windows 10"
    screenResolution: "1440x900"
    preExec:
      # Sauce caps all preExec at 300s total; full install often needs --no-audit/--ignore-scripts (skip husky prepare).
      - npm install --include=dev --no-audit --no-fund --ignore-scripts --loglevel=error
      - node ./scripts/sauce-remove-playwright.js
    testMatch: [".*e2eTest/pageNotFound\\.spec\\.ts"]
    passThreshold: 1
    params:
      browserName: "chromium"
      project: "chromium"
      grep: "@crossbrowser"

