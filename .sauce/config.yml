# Sauce Labs Playwright (saucectl) — see https://docs.saucelabs.com/web-apps/automated-testing/playwright/
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 1
  metadata:
    tags:
      - pcs-frontend
      - e2e
      - playwright
    build: $BUILD_NUMBER

defaults:
  timeout: 15m

playwright:
  # Resolves @playwright/test version from package.json — must match a Sauce-supported version:
  # https://docs.saucelabs.com/web-apps/automated-testing/playwright/#supported-testing-platforms
  version: package.json
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

reporters:
  spotlight:
    enabled: true
  junit:
    enabled: true
    filename: saucectl-report.xml

# Optional: pass through secrets from the CI agent (see README). Example:
# env:
#   PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET

suites:
  # Cross-browser smoke on Sauce: only tests tagged @crossbrowser (see e2e specs).
  - name: pcs-crossbrowser-chrome-win
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - src/test/ui/e2eTest/.*\.spec\.ts
    params:
      browserName: chrome
      project: chrome
      grep: '@crossbrowser'

  # Uncomment when you want additional browsers on Sauce.
  # - name: pcs-crossbrowser-firefox-win
  #   platformName: Windows 11
  #   screenResolution: 1920x1080
  #   testMatch:
  #     - src/test/ui/e2eTest/.*\.spec\.ts
  #   params:
  #     browserName: firefox
  #     project: firefox
  #     grep: '@crossbrowser'
  #
  # - name: pcs-crossbrowser-webkit-mac
  #   platformName: macOS 13
  #   screenResolution: 1920x1080
  #   testMatch:
  #     - src/test/ui/e2eTest/.*\.spec\.ts
