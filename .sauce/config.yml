apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 5
  tunnel:
    name: $SAUCE_TUNNEL_NAME
  metadata:
    tags:
      - pcs-frontend
      - pcssaucelab

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

# Substituted from the host when running saucectl (export in shell / Jenkins vault).
env:
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  CI: 'true'
  NODE_CONFIG_ENV: test
  PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET
  IDAM_PCS_USER_EMAIL: $IDAM_PCS_USER_EMAIL
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD
  IDAM_PCS_USER_PASSWORD_B64: $IDAM_PCS_USER_PASSWORD_B64
  SAUCE_TUNNEL_NAME: $SAUCE_TUNNEL_NAME
  # Optional: PCS base URL for `config` / tests that read TEST_URL
  TEST_URL: $TEST_URL

suites:
  - name: 'pcssaucelab @pcssaucelab (Chrome)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - '.*sauceSmoke\.spec\.ts$'
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: '@pcssaucelab'

reporters:
  spotlight:
    enabled: true
