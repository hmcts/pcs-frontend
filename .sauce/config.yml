apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 5
  metadata:
    tags:
      - pcs-frontend
      - pcssaucelab

defaults:
  timeout: 30m

playwright:
  version: 1.58.1
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

npm:
  packages:
    '@hmcts/playwright-common': '1.0.39'

env:
  PLAYWRIGHT_SKIP_ALLURE: 'true'
  IDAM_PCS_USER_PASSWORD: $IDAM_PCS_USER_PASSWORD

suites:
  - name: 'pcssaucelab @pcssaucelab (Chrome)'
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - '.*sauceSmoke\.spec\.ts$'
    params:
      browserName: chrome
      project: chrome
      headless: true
      grep: '@pcssaucelab'

reporters:
  spotlight:
    enabled: true
