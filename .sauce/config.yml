# Sauce Labs Playwright (saucectl) — see https://docs.saucelabs.com/web-apps/automated-testing/playwright/
apiVersion: v1alpha
kind: playwright

sauce:
  region: eu-central-1
  concurrency: 3
  metadata:
    tags:
      - pcs-frontend
      - e2e
      - playwright
    build: $BUILD_NUMBER

defaults:
  timeout: 15m

playwright:
  # Resolves @playwright/test version from package.json — must match a Sauce-supported version:
  # https://docs.saucelabs.com/web-apps/automated-testing/playwright/#supported-testing-platforms
  version: package.json
  configFile: playwright.config.ts

nodeVersion: v22

rootDir: ./

reporters:
  spotlight:
    enabled: true
  junit:
    enabled: true
    filename: saucectl-report.xml

# Optional: pass through secrets from the CI agent (see README). Example:
# env:
#   PCS_FRONTEND_IDAM_SECRET: $PCS_FRONTEND_IDAM_SECRET

suites:
  - name: pcs-e2e-chrome-win
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - src/test/ui/e2eTest/.*\.spec\.ts
    params:
      browserName: chrome
      project: chrome
      grep: '@nightly'

  - name: pcs-e2e-firefox-win
    platformName: Windows 11
    screenResolution: 1920x1080
    testMatch:
      - src/test/ui/e2eTest/.*\.spec\.ts
    params:
      browserName: firefox
      project: firefox
      grep: '@nightly'

  - name: pcs-e2e-webkit-mac
    platformName: macOS 13
    screenResolution: 1920x1080
    testMatch:
      - src/test/ui/e2eTest/.*\.spec\.ts
    params:
      browserName: webkit
      project: webkit
      grep: '@nightly'
